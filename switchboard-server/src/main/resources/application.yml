spring:
  application:
    name: switchboard-server

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:switchboard}
    username: ${DB_USERNAME:switchboard}
    password: ${DB_PASSWORD:switchboard}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
