name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: server build + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 22

      - uses: gradle/actions/setup-gradle@v4

      - name: compile all modules
        run: ./gradlew compileJava

      - name: run unit + architecture tests
        run: >-
          ./gradlew :switchboard-server:test
          --tests "com.switchboard.domain.*"
          --tests "com.switchboard.application.*"
          --tests "com.switchboard.architecture.*"

      - name: run sdk tests
        run: ./gradlew :switchboard-sdk-java:test

      - name: run openfeature tests
        run: ./gradlew :switchboard-openfeature-provider:test

  dashboard:
    name: dashboard build + typecheck
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: switchboard-dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: switchboard-dashboard/package-lock.json

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vite build
